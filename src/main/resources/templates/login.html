<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Plan Paciente</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="icon" th:href="@{/images/favicon.ico}" type="image/x-icon">
    <style>
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 70vh;
            padding-bottom: 60px;
        }
        .login-card {
            border: 1px solid #ccc;
            padding: 30px 40px;
            text-align: center;
            background: #fff;
            width: 260px;
        }
        .login-card .avatar {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .login-card label {
            display: inline-block;
            width: 50px;
            font-weight: bold;
            color: #E8630A;
            text-align: right;
            margin-right: 6px;
        }
        .login-card .field-row {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }
        .login-card input[type=text],
        .login-card input[type=password] {
            width: 130px;
            padding: 4px 6px;
            margin: 0;
            border: 1px solid #aaa;
            border-radius: 3px;
        }
        .login-card button {
            margin-top: 10px;
            width: 130px;
            padding: 6px;
            font-size: 14px;
        }
        .msg-error {
            color: red;
            font-size: 13px;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<div class="page-header">
    <img th:src="@{/images/header.jpg}" alt="Patient Care" style="max-height: 80px;"/>
</div>
<div style="background-color: #2255AA; color: white; text-align: center; padding: 8px; font-weight: bold; font-size: 15px;">
    INGRESO
</div>

<div class="login-wrapper">
    <div class="login-card">

        <div class="avatar">
            <img th:src="@{/images/login.png}" alt="usuario" style="width: 60px; height: 60px;"/>
        </div>

        <div th:if="${param.error}" class="msg-error">
            Usuario o clave incorrectos.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="field-row">
                <label for="username">Id</label>
                <input type="text" id="username" name="username" required/>
            </div>
            <div class="field-row">
                <label for="password">Clave</label>
                <input type="password" id="password" name="password" required/>
            </div>
            <button type="submit">Ingresar</button>
        </form>

    </div>
</div>

<footer>
    Todos los derechos reservados . 2026 . TotalSoft Inc. info@tsinc.com
</footer>

</body>
</html>
